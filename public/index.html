<!DOCTYPE html>
<html lang="en" class="dark" style="color-scheme: dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0b">
  <title>Session Viewer — AI Agent Conversations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="app">
    <!-- Skip link for accessibility -->
    <a href="#main-content" class="skip-link">Skip to content</a>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar" role="navigation" aria-label="Session navigation">
      <header class="sidebar-header">
        <h1 class="logo">
          <span class="logo-icon" aria-hidden="true">◈</span>
          <span>Sessions</span>
        </h1>
        <button
          class="sidebar-toggle"
          id="sidebar-toggle"
          aria-label="Toggle sidebar"
          type="button"
        >
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <path d="M3 5h12M3 9h12M3 13h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </header>

      <!-- Agent Tabs -->
      <div class="agent-tabs" role="tablist" aria-label="Agent filter">
        <button role="tab" class="tab active" data-agent="all" aria-selected="true">All</button>
        <button role="tab" class="tab" data-agent="claude" aria-selected="false">Claude Code</button>
        <button role="tab" class="tab" data-agent="amp" aria-selected="false">Amp</button>
      </div>

      <!-- Search -->
      <div class="search-wrap">
        <label for="search-input" class="sr-only">Search sessions</label>
        <input
          id="search-input"
          type="search"
          placeholder="Search sessions…"
          autocomplete="off"
          spellcheck="false"
          class="search-input"
        >
      </div>

      <!-- Session List -->
      <nav id="session-list" class="session-list" aria-label="Sessions">
        <div class="loading-state" id="sidebar-loading">
          <div class="spinner" aria-hidden="true"></div>
          <p>Loading sessions…</p>
        </div>
      </nav>

      <footer class="sidebar-footer">
        <div class="session-count" id="session-count" aria-live="polite"></div>
      </footer>
    </aside>

    <!-- Main Content -->
    <main id="main-content" class="main">
      <!-- Empty State -->
      <div id="empty-state" class="empty-state">
        <div class="empty-icon" aria-hidden="true">
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
            <rect x="8" y="12" width="48" height="40" rx="6" stroke="currentColor" stroke-width="2" opacity="0.3"/>
            <path d="M20 28h24M20 36h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
          </svg>
        </div>
        <h2 style="text-wrap: balance">Select a session to view</h2>
        <p class="empty-hint">Choose a conversation from the sidebar, or use <kbd>⌘</kbd><kbd>K</kbd> to search.</p>
      </div>

      <!-- Session View -->
      <div id="session-view" class="session-view" hidden>
        <!-- Session Header -->
        <header class="session-header">
          <div class="session-meta">
            <span class="agent-badge" id="agent-badge"></span>
            <time id="session-date" datetime=""></time>
            <span class="session-model" id="session-model"></span>
          </div>
          <h2 class="session-title" id="session-title" style="text-wrap: balance"></h2>
          <div class="session-actions">
            <button class="btn btn-secondary" id="btn-export-md" type="button" aria-label="Export as Markdown">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M2 11l6 3 6-3M2 8l6 3 6-3M2 5l6 3 6-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Export .md
            </button>
            <button class="btn btn-secondary" id="btn-copy-md" type="button" aria-label="Copy as Markdown">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <rect x="5" y="5" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
                <path d="M11 5V3.5A1.5 1.5 0 009.5 2h-6A1.5 1.5 0 002 3.5v6A1.5 1.5 0 003.5 11H5" stroke="currentColor" stroke-width="1.5"/>
              </svg>
              Copy
            </button>
          </div>
        </header>

        <!-- Messages -->
        <div id="messages" class="messages" role="log" aria-label="Conversation messages"></div>
      </div>

      <!-- Loading State -->
      <div id="session-loading" class="session-loading" hidden>
        <div class="spinner large" aria-hidden="true"></div>
        <p>Loading conversation…</p>
      </div>
    </main>
  </div>

  <!-- Mobile menu button -->
  <button class="mobile-menu-btn" id="mobile-menu-btn" type="button" aria-label="Open sidebar">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
      <path d="M3 5h12M3 9h12M3 13h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </button>

  <script src="/app.js"></script>
</body>
</html>
